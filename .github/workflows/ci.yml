name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # The AutoTLM One's partition table can brick uploads if `otadata`/`app0`
  # drift off the offsets the esp32 core hardcodes — and compiling proves
  # nothing about it (boards 0.3.0 compiled fine and boot-looped the bench
  # unit on its first flash). This check stands in for the flash.
  partitions:
    name: partition table offsets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 board-package/verify-partitions.py

  examples:
    name: examples (${{ matrix.fqbn }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fqbn:
          - esp32:esp32:esp32
          - autotlm:esp32:one
    env:
      AUTOTLM_INDEX: https://raw.githubusercontent.com/AcidAlchamy/autotlm-core/master/board-package/package_autotlm_index.json
    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-arduino-cli@v2

      - name: Install platforms
        run: |
          arduino-cli core update-index --additional-urls "$AUTOTLM_INDEX"
          arduino-cli core install esp32:esp32@3.3.8 --additional-urls "$AUTOTLM_INDEX"
          if [ "${{ matrix.fqbn }}" = "autotlm:esp32:one" ]; then
            # Installs the PUBLISHED board package from the release zip — CI
            # therefore also proves the Boards Manager artifact stays healthy.
            arduino-cli core install autotlm:esp32 --additional-urls "$AUTOTLM_INDEX"
          fi

      - name: Compile every example
        run: |
          set -e
          for ex in examples/*/; do
            fqbn="${{ matrix.fqbn }}"
            # BLE + WiFi don't fit the generic board's classic 1.3 MB app
            # partition; the AutoTLM One's standard table (1.9 MB OTA slots)
            # takes it as-is. Generic gets the big-app scheme for this one.
            if [ "$ex" = "examples/08_BleChangeWifi/" ] && [ "$fqbn" = "esp32:esp32:esp32" ]; then
              fqbn="esp32:esp32:esp32:PartitionScheme=huge_app"
            fi
            echo "::group::$ex ($fqbn)"
            arduino-cli compile --fqbn "$fqbn" --library . "$ex"
            echo "::endgroup::"
          done
