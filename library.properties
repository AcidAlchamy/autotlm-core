sentence=The library for the AutoTLM One car-telemetry dev dongle — OBD-II, GNSS, IMU, browser-based provisioning and a road-proven cloud push in a few lines.
paragraph=AutoTLM Core is the open-source developer library of the AutoTLM platform. Select the AutoTLM One board, install this library, and read a car: a clean facade (AutoTLM car; car.begin(); car.update();) over OBD-II PIDs/DTCs/VIN via from-scratch ISO 15765-4, GNSS, an IMU, captive-portal first-boot provisioning (car.provision()) and a robust dual-core HTTP telemetry push.
