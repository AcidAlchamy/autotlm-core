sentence=Read a car and push telemetry in a few lines — OBD-II, GNSS, IMU and a road-proven cloud push for ESP32-class telemetry devices.
paragraph=AutoTLM Core is the open-source developer library of the AutoTLM car-telemetry platform. It gives you a clean facade (AutoTLM car; car.begin(); car.update();) over OBD-II PIDs/DTCs/VIN, GNSS, an IMU and a robust dual-core HTTP telemetry push, with a hardware abstraction layer so the same sketch runs on a plain ESP32 today and on our own AutoTLM One board tomorrow.
